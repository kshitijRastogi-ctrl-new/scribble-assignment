name: Pre-Evaluation Check

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pre-evaluation:
    name: Pre-Evaluation Evidence
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        if: hashFiles('backend/package-lock.json') != ''
        working-directory: backend
        continue-on-error: true
        run: npm ci

      - name: Install frontend dependencies
        if: hashFiles('frontend/package-lock.json') != ''
        working-directory: frontend
        continue-on-error: true
        run: npm ci

      - name: Run pre-evaluation check
        id: precheck
        run: |
          set +e
          node .github/scripts/pre-evaluation-check.mjs
          exit_code=$?
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publish precheck to workflow summary
        run: cat precheck-results/precheck-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload precheck reports
        uses: actions/upload-artifact@v4
        with:
          name: precheck-report
          path: |
            precheck-results/precheck-report.md
            precheck-results/precheck-report.json

      - name: Fail on precheck failure
        if: steps.precheck.outputs.exit_code != '0'
        run: |
          echo "Pre-evaluation failed. See the workflow summary or precheck-report artifact."
          exit 1
