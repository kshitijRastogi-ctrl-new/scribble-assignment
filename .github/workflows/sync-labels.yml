name: Sync Labels

on:
  pull_request:
    branches: [main]
    paths: [.github/labels.yml]
  workflow_dispatch:

permissions:
  issues: write

jobs:
  sync:
    name: Sync Labels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync labels from config
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('.github/labels.yml', 'utf8');
            const labels = [];
            let current = null;
            for (const line of raw.split('\n')) {
              const nameMatch = line.match(/^- name:\s*"(.+)"/);
              const colorMatch = line.match(/^\s+color:\s*"(.+)"/);
              const descMatch = line.match(/^\s+description:\s*"(.+)"/);
              if (nameMatch) { current = { name: nameMatch[1] }; labels.push(current); }
              else if (colorMatch && current) { current.color = colorMatch[1]; }
              else if (descMatch && current) { current.description = descMatch[1]; }
            }

            const { owner, repo } = context.repo;
            for (const label of labels) {
              try {
                await github.rest.issues.updateLabel({ owner, repo, ...label });
                console.log(`Updated: ${label.name}`);
              } catch {
                await github.rest.issues.createLabel({ owner, repo, ...label });
                console.log(`Created: ${label.name}`);
              }
            }
